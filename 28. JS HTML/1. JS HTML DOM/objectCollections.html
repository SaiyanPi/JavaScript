<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML DOM</title>
</head>
<body>
    <div>
        <form id="form1" action="/action_page.php">
            First name: <input type="text" name="fname" value="Saiyan"><br>
            Last name: <input type="text" name="lname" value="Pi"><br><br>
            <input type="submit" value="Submit">
        </form>

        <p id="1"></p>

        <script>
            const a = document.forms["form1"];
            const display = document.getElementById("1");

            let text = "";

            for(let i = 0; i < a.length; i++) {
                text += a.elements[i].value + "<br>";
            }
            display.innerHTML = `The elements value from the form are:<br> ${text}`;
        </script>
    </div>
</body>
</html>
