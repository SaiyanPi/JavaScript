<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div>
        <h3>Mouseover and Mouseout</h3>

        <div id="box" style="width:200px;height:100px;padding:16px;border:1px solid #000;">
            Move mouse over this box
        </div>

        <script>
            const box = document.getElementById("box");

            // let the box listen for mouseover
            box.addEventListener("mouseover", function() {
                box.innerHTML = "Mouse is over me!";
            })

            // let the box listen for mouseover
            box.addEventListener("mouseout", function() {
                box.innerHTML = "Mouse is out!";
            })
        </script>
    </div>
    <hr>
    <div>
        <h3>The onmousedown Attribute</h3>

        <div onmousedown="mDown(this)" onmouseup="mUp(this)" 
            style="background-color:#D94A38;width:200px;height:100px;padding:16px;border:1px solid #000;">
            Click Me
        </div>

        <script>
            function mDown(obj) {
                obj.style.backgroundColor = "#1ec5e5";
                obj.innerHTML = "Release Me";
            }

            function mUp(obj) {
                obj.style.backgroundColor="#D94A38";
                obj.innerHTML="Thank You";
            }
        </script>
    </div>
    
</body>
</html>
