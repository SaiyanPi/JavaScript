<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
</head>
<body>
    <div>
        <h3>Timing Events</h3>
        <button id="btn">Start</button>
        <p id="demo"></p>

        <script>
            // let btn listen for a click
            const btn = document.getElementById("btn");
            
            btn.addEventListener("click", function() {
                setTimeout(showMsg, 5000);
            });

            // function to display message
            function showMsg() {
                document.getElementById("demo").innerHTML = "Hello after 5 seconds";
            }
        </script>
    </div>
    
</body>
</html>
