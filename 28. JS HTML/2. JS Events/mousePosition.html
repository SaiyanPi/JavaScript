<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div>
        <h3>Mouse Position</h3>
        <p id="demo">Move mouse in this window!</p>

        <script>
            // let document listen for mouse move
            document.addEventListener("mousemove", function(event) {
                let position = document.getElementById("demo");
                position.innerHTML = `X: ${event.clientX}, Y: ${event.clientY}`
            });
        </script>
    </div>
    
</body>
</html>
