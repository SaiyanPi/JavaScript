<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter</title>
</head>
<body>
    <div style = "text-align: center;">
        <h2>Counter</h2>
        <p id="count" style="font-size:50px;">0</p>

        <button onclick="increaseCount()">+</button>
        <button onclick="decreaseCount()">-</button>
        <button onclick="resetCount()">Reset</button>
        <button onclick="saveCount()">Save</button>
        <button onclick="loadCount()">Load</button>

        <script>
            // Declare a counter
            let count = 0;
            
            // load the saved counter when the page opens
            loadCount();

            // Function to display the counter
            function updateCount() {
                document.getElementById("count").innerHTML = count;
            }

            // Function to increase the counter
            function increaseCount() {
                count ++;
                updateCount();
            }

            // Function to decrease the counter
            function decreaseCount() {
                // count --;
                // updateCount();

                // prevent negative count
                if(count > 0) {
                    count --;
                    updateCount();
                } else {
                    alert("negative counter not allowed!")
                }
            }

            // Function to reset the counter
            function resetCount() {
                count = 0;
                updateCount();
            }

            // Function to save the counter
            function saveCount() {
                localStorage.setItem("count", count);
            }

            // Function to load the counter
            function loadCount() {
                let saved = localStorage.getItem("count");
                if(saved !== null) {
                    count = Number(saved);
                }
                updateCount();
            }
        </script>
    </div>
    
</body>
</html>
